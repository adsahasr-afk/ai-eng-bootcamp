name: CI

# TIER 1 only: deterministic tests. No API key, no cost, no torch.
# The paid eval gate runs LOCALLY (see phase2-rag/CI.md).
on:
  push:
  pull_request:

jobs:
  fast-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: phase2-rag
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install light test deps (no torch, no secrets)
        run: pip install pytest numpy

      # 'python -m pytest' puts the CWD on sys.path so 'rag' and
      # 'evaluation' import correctly.
      - name: Run deterministic tests
        run: python -m pytest -q tests
